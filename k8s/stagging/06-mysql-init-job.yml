# ══════════════════════════════════════════════════════
#   MYSQL INIT JOB
#   Runs db.sql once to create the tables
#   After it finishes it stops automatically
# ══════════════════════════════════════════════════════

apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-init
  namespace: taskmanager
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mysql-init
          image: mysql:8.0
          command:
            - sh
            - -c
            - |
              echo "⏳ Waiting for MySQL to be ready..."
              until mysqladmin ping -h mysql-service -uroot -proot --silent; do
                echo "MySQL not ready yet, waiting..."
                sleep 5
              done
              echo "✅ MySQL is ready!"
              echo "🗄️  Creating tables..."
              mysql -h mysql-service -uroot -proot taskmanager << 'SQL'
                CREATE TABLE IF NOT EXISTS users (
                  id         INT AUTO_INCREMENT PRIMARY KEY,
                  username   VARCHAR(50)  NOT NULL UNIQUE,
                  email      VARCHAR(100) NOT NULL UNIQUE,
                  password   VARCHAR(255) NOT NULL,
                  created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                );
                CREATE TABLE IF NOT EXISTS tasks (
                  id          INT AUTO_INCREMENT PRIMARY KEY,
                  user_id     INT NOT NULL,
                  title       VARCHAR(200) NOT NULL,
                  description TEXT,
                  status      ENUM('pending','in-progress','completed') DEFAULT 'pending',
                  priority    ENUM('low','medium','high') DEFAULT 'medium',
                  created_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                  updated_at  TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
                  FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE
                );
              SQL
              echo "✅ Tables created successfully!"
          env:
            - name: MYSQL_PWD
              value: root
