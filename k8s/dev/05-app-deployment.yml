# ══════════════════════════════════════════════════════
#   NODE.JS APP DEPLOYMENT + SERVICE
#
#   ⚠️  IMPORTANT: Change YOUR_DOCKERHUB_USERNAME
#   to your actual Docker Hub username
#   Example: kangaleashish68/task-manager-app:latest
# ══════════════════════════════════════════════════════

# ── App Deployment ────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskmanager-app
  namespace: taskmanager
  labels:
    app: taskmanager-app
spec:
  replicas: 2                       # run 2 copies for high availability
  selector:
    matchLabels:
      app: taskmanager-app
  template:
    metadata:
      labels:
        app: taskmanager-app
    spec:
      containers:
        - name: taskmanager-app

          # ⚠️ CHANGE THIS to your Docker Hub username
          image: sweshsmarth/task-app:v3
          # example: kangaleashish68/task-manager-app:latest

          imagePullPolicy: Always   # always pull latest image
          ports:
            - containerPort: 3000

          # ── Config from ConfigMap ─────────────────────
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: taskmanager-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: taskmanager-config
                  key: DB_PORT

            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: taskmanager-config
                  key: DB_USER

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: taskmanager-config
                  key: DB_NAME

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: taskmanager-config
                  key: PORT

          # ── Passwords from Secret ─────────────────────
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: taskmanager-secret
                  key: DB_PASSWORD

            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: taskmanager-secret
                  key: SESSION_SECRET

          # ── Health check ──────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"

---

# ── App Service ───────────────────────────────────────
# NodePort exposes your app on port 30000
# Access via: http://localhost:30000  or  http://NODE_IP:30000
apiVersion: v1
kind: Service
metadata:
  name: taskmanager-service
  namespace: taskmanager
spec:
  type: NodePort
  selector:
    app: taskmanager-app
  ports:
    - port: 3000           # service port inside k8s
      targetPort: 3000     # container port
      nodePort: 30000      # external port → access from browser
