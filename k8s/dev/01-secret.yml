# ══════════════════════════════════════════════════════
#   SECRET — Stores sensitive data like passwords
#   Values must be base64 encoded
#
#   To encode your own values run:
#   echo -n "root" | base64          → gives: cm9vdA==
#   echo -n "taskmanager123" | base64 → gives: dGFza21hbmFnZXIxMjM=
#   echo -n "taskmanager" | base64   → gives: dGFza21hbmFnZXI=
# ══════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: taskmanager-secret
  namespace: taskmanager
type: Opaque
data:
  # These are base64 encoded values
  # "root"           → cm9vdA==
  # "taskmanager"    → dGFza21hbmFnZXI=
  # "taskmanager123" → dGFza21hbmFnZXIxMjM=

  MYSQL_ROOT_PASSWORD: cm9vdA==          # root
  MYSQL_PASSWORD:      cm9vdA==          # root
  MYSQL_DATABASE:      dGFza21hbmFnZXI=  # taskmanager
  DB_PASSWORD:         cm9vdA==          # root
  SESSION_SECRET:      dGFza21hbmFnZXIxMjM=  # taskmanager123
