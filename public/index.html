<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <!-- Background Grid -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="auth-container">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">⬡</div>
      <h1 class="brand-name">TaskFlow</h1>
      <p class="brand-sub">DevOps-Grade Task Management</p>
    </div>

    <!-- Tab Switcher -->
    <div class="tab-switcher">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn" data-tab="register">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="auth-form active-form" autocomplete="off">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required />
      </div>
      <div id="loginError" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader hidden">●●●</span>
      </button>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm" class="auth-form" autocomplete="off">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="regUsername" placeholder="johndoe" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="regEmail" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password <span class="hint">(min 6 chars)</span></label>
        <input type="password" id="regPassword" placeholder="••••••••" required />
      </div>
      <div id="registerError" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader hidden">●●●</span>
      </button>
    </form>

    <p class="footer-note">
      Powered by Node.js · MySQL · Docker · Jenkins
    </p>
  </div>

  <script>
    // ── Tab Switching ────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active-form'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + 'Form').classList.add('active-form');
        document.getElementById('loginError').classList.add('hidden');
        document.getElementById('registerError').classList.add('hidden');
      });
    });

    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function setLoading(form, loading) {
      const btn    = form.querySelector('.btn-primary');
      const text   = btn.querySelector('.btn-text');
      const loader = btn.querySelector('.btn-loader');
      btn.disabled = loading;
      text.classList.toggle('hidden', loading);
      loader.classList.toggle('hidden', !loading);
    }

    // ── LOGIN ────────────────────────────────────────────
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      document.getElementById('loginError').classList.add('hidden');
      setLoading(e.target, true);

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
          }),
          credentials: 'include',
        });
        const data = await res.json();
        if (!res.ok) { showError('loginError', data.error); setLoading(e.target, false); return; }
        window.location.href = '/dashboard.html';
      } catch {
        showError('loginError', 'Network error. Try again.');
        setLoading(e.target, false);
      }
    });

    // ── REGISTER ─────────────────────────────────────────
    document.getElementById('registerForm').addEventListener('submit', async e => {
      e.preventDefault();
      document.getElementById('registerError').classList.add('hidden');
      setLoading(e.target, true);

      try {
        const res  = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('regUsername').value,
            email:    document.getElementById('regEmail').value,
            password: document.getElementById('regPassword').value,
          }),
          credentials: 'include',
        });
        const data = await res.json();
        if (!res.ok) { showError('registerError', data.error); setLoading(e.target, false); return; }
        window.location.href = '/dashboard.html';
      } catch {
        showError('registerError', 'Network error. Try again.');
        setLoading(e.target, false);
      }
    });

    // ── Auto-redirect if already logged in ───────────────
    (async () => {
      try {
        const res = await fetch('/api/me', { credentials: 'include' });
        if (res.ok) window.location.href = '/dashboard.html';
      } catch {}
    })();
  </script>
</body>
</html>
